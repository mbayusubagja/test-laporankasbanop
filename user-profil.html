<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f5f5f5">
<title>Laporan</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/button.css">


</head>

<body>



<div class="container">

    <div class="card profil-card">

        <div class="header">
            <h2>Profil</h2>
        </div>

        <div class="profil-item">
            <span class="label">Nama</span>
            <span class="value" id="namaUser">Loading ...</span>
        </div>

        <div class="profil-item">
            <span class="label">Jabatan</span>
            <span class="value" id="jabatanUser">Loading ...</span>
        </div>

        <div class="profil-item">
            <span class="label">gmail</span>
            <span class="value" id="gmailUser">Loading ...</span>
        </div>

    </div>

  <div class="card">
    <button onclick="aturProfil()">Edit Profil</button>
    <button onclick="backProfil()">Kembali</button>
  </div>
  
</div>

<footer id="footer">
© 2026 Laporan Keuangan Operasional
</footer>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/user-profil.js"></script>

</body>
</html>
