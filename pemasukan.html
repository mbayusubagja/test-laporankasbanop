<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<title>Pemasukan</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/button.css">
</head>

<body>

<div class="container">

  <div class="header">
    <h2>Tambah Pemasukan</h2>
  </div>

  <div class="card">
    <label for="tanggal">Tanggal</label>
    <input type="datetime-local" id="tanggal">

    <label for="kategori">Kategori</label>
    <select id="kategori">
      <option value="">Pilih Kategori</option>
      <option value="Top Up Kasbon OP">Top Up Kasbon OP</option>
      <option value="Lainnya">Lainnya</option>
    </select>

    <label for="nominal">Nominal</label>
    <input id="nominal" type="text" inputmode="numeric" placeholder="0">

    <label for="catatan">Keterangan</label>
    <textarea id="catatan" placeholder="Catatan"></textarea>
    
    <label for="file">Upload Bukti</label>
    <input type="file" id="file" accept="image/*,.pdf">
    <img id="preview">
    
    <p id="status"></p>
    <button id="btnSimpan" onclick="simpanPemasukan()">Simpan</button>

    <button class="btnBack" >Kembali</button>

  </div>

</div>

<footer id="footer">
© 2026 Laporan Keuangan Operasional
</footer>

<!-- SCRIPT -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/pemasukan.js"></script>


</body>
</html>
